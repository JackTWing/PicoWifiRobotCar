<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Control Offline</title>
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <main class="dashboard" aria-label="Offline status page">
    <section class="zone zone--offline" aria-labelledby="offline-title">
      <h1 id="offline-title">Robot control is unavailable</h1>
      <p>
        This dashboard is running offline, but the robot cannot be reached right now.
      </p>
      <p>
        Reconnect to the robot WiFi network, then reopen the dashboard to send commands.
      </p>
    </section>
  </main>
</body>
</html>

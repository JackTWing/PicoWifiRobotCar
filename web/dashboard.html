<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico WiFi Robot Dashboard</title>
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <main class="dashboard" aria-label="Robot dashboard">
    <header class="dashboard__header">
      <h1>Pico WiFi Robot Car</h1>
      <p class="status" id="status" role="status" aria-live="polite">Ready</p>
    </header>

    <section class="zone zone--drive" aria-labelledby="drive-title">
      <h2 id="drive-title">Drive Controls</h2>
      <div class="dpad" role="group" aria-label="Directional pad">
        <button class="control control--drive" data-path="/forward" aria-label="Drive forward">▲</button>
        <button class="control control--drive" data-path="/left" aria-label="Turn left">◀</button>
        <button class="control control--drive" data-path="/stop" aria-label="Stop">■</button>
        <button class="control control--drive" data-path="/right" aria-label="Turn right">▶</button>
        <button class="control control--drive" data-path="/backward" aria-label="Drive backward">▼</button>
      </div>
    </section>

    <section class="zone zone--secondary" aria-labelledby="secondary-title">
      <h2 id="secondary-title">Secondary Actions</h2>

      <label class="speed-control" for="speed">Speed</label>
      <input id="speed" type="range" min="0" max="100" step="1" value="50" aria-label="Speed">

      <div class="actions" role="group" aria-label="Auxiliary controls">
        <button class="control" data-path="/lights/toggle">Lights</button>
        <button class="control" data-path="/camera/toggle">Camera</button>
        <button class="control control--danger" data-path="/stop">Emergency Stop</button>
      </div>
    </section>
  </main>

  <script src="./dashboard.js"></script>
</body>
</html>

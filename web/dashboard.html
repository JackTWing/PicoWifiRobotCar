<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <title>Pico WiFi Robot Dashboard</title>
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <main class="dashboard" aria-label="Robot dashboard">
    <header class="dashboard__header">
      <h1>Pico WiFi Robot Car</h1>
      <p class="status" id="status" role="status" aria-live="polite">Ready</p>
      <p class="connection" aria-live="polite">Connection: <span id="connection" data-state="reconnecting">reconnecting</span></p>
    </header>

    <section class="zone zone--drive" aria-labelledby="drive-title">
      <h2 id="drive-title">Drive Controls</h2>
      <div class="dpad" role="group" aria-label="Directional pad">
        <button class="control control--drive" data-cmd="forward" aria-label="Drive forward">▲</button>
        <button class="control control--drive" data-cmd="left" aria-label="Turn left">◀</button>
        <button class="control control--drive" data-cmd="stop" aria-label="Stop">■</button>
        <button class="control control--drive" data-cmd="right" aria-label="Turn right">▶</button>
        <button class="control control--drive" data-cmd="backward" aria-label="Drive backward">▼</button>
      </div>
    </section>

    <section class="zone zone--secondary" aria-labelledby="secondary-title">
      <h2 id="secondary-title">Secondary Actions</h2>

      <label class="speed-control" for="speed">Speed</label>
      <input id="speed" type="range" min="0" max="100" step="1" value="50" aria-label="Speed">

      <div class="actions" role="group" aria-label="Auxiliary controls">
        <button class="control" data-cmd="lights_toggle">Lights</button>
        <button class="control" data-cmd="camera_toggle">Camera</button>
      </div>
    </section>
  </main>


  <button class="control control--danger control--emergency" data-cmd="stop" aria-label="Emergency stop">Emergency Stop</button>

  <script src="./dashboard.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
